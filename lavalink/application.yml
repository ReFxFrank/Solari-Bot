# Lavalink v4 configuration. Used by the `music` compose profile and consumed
# by the bot's Lavalink service in Phase 4. The password here must match
# LAVALINK_PASSWORD in your .env.
server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: '${LAVALINK_SERVER_PASSWORD:youshallnotpass}'
    sources:
      # Lavalink v4 REMOVED the built-in YouTube source — this flag is inert.
      # YouTube playback requires the standalone youtube-source plugin, which
      # lands with the music module (Phase 4). Until then these sources work:
      # soundcloud, bandcamp, twitch, vimeo, and direct http URLs.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    trackStuckThresholdMs: 10000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    opusEncodingQuality: 10
    resamplingQuality: LOW

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

logging:
  level:
    root: INFO
    lavalink: INFO
