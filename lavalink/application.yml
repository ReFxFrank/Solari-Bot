# Lavalink v4 configuration. Used by the `music` compose profile and consumed by
# the bot's Lavalink service. The password here must match LAVALINK_PASSWORD in
# your .env.
server:
  port: 2333
  address: 0.0.0.0

lavalink:
  # Lavalink v4 removed the built-in YouTube source, so we load the standalone
  # youtube-source plugin. Lavalink downloads it from maven.lavalink.dev on first
  # boot (needs outbound HTTPS). Bump the version as new releases land.
  plugins:
    - dependency: 'dev.lavalink.youtube:youtube-plugin:1.18.1'
      snapshot: false
  server:
    password: '${LAVALINK_SERVER_PASSWORD:youshallnotpass}'
    sources:
      # Built-in youtube stays OFF — the plugin below provides YouTube instead.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    trackStuckThresholdMs: 10000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    opusEncodingQuality: 10
    resamplingQuality: LOW

# youtube-source plugin config. `clients` is the fallback order of the innerTube
# clients it impersonates. TV is the client OAuth applies to (verified against
# the 1.18.1 jar) — it's what makes playback work from datacenter IPs once
# oauth is enabled.
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - TV
      - WEB
      - WEBEMBEDDED
    # YouTube blocks unauthenticated streaming from datacenter IPs ("This video
    # requires login"). OAuth with a throwaway Google account is the supported
    # fix. Setup (see .env.example): enable with NO refresh token → Lavalink logs
    # a google.com/device code → authorize with a BURNER account → copy the
    # refresh token it logs back into .env. Values come from the environment so
    # no secret ever lives in this file.
    oauth:
      enabled: ${YOUTUBE_OAUTH_ENABLED:false}
      refreshToken: '${YOUTUBE_OAUTH_REFRESH_TOKEN:}'
    # Alternative/additional remedy: a poToken pins the WEB client to a trusted
    # session (generate with the youtube-trusted-session-generator container).
    pot:
      token: '${YOUTUBE_POT_TOKEN:}'
      visitorData: '${YOUTUBE_POT_VISITOR_DATA:}'

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

logging:
  level:
    root: INFO
    lavalink: INFO
