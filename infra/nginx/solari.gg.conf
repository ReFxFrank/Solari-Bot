# Solari dashboard behind an EXISTING nginx (e.g. a VPS already serving other
# sites on :80/:443). Cloudflare (proxied / orange cloud) terminates public TLS
# and connects to this origin over HTTPS using a Cloudflare Origin Certificate,
# so run Cloudflare SSL/TLS mode "Full (strict)".
#
# The Solari dashboard runs as a container bound to 127.0.0.1:3000 (the prod
# compose overlay, `--profile apps`, no bundled Caddy). nginx just reverse-proxies
# solari.gg to it, alongside your other server blocks.
#
# Install:
#   sudo mkdir -p /etc/ssl/cloudflare
#   sudo nano /etc/ssl/cloudflare/solari.gg.pem   # paste the CF Origin Certificate
#   sudo nano /etc/ssl/cloudflare/solari.gg.key   # paste the CF Private Key
#   sudo chmod 600 /etc/ssl/cloudflare/solari.gg.key
#   sudo cp infra/nginx/solari.gg.conf /etc/nginx/sites-available/solari.gg
#   sudo ln -s /etc/nginx/sites-available/solari.gg /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name solari.gg www.solari.gg wiki.solari.gg;
    # Cloudflare already forces HTTPS at the edge; this is just a safety net.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    # wiki.solari.gg hits the same Next.js app — its middleware sees the wiki
    # host and serves the /docs pages at the subdomain root.
    server_name solari.gg www.solari.gg wiki.solari.gg;

    # Cloudflare Origin Certificate (trusted only by Cloudflare).
    ssl_certificate     /etc/ssl/cloudflare/solari.gg.pem;
    ssl_certificate_key /etc/ssl/cloudflare/solari.gg.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Send www -> apex so auth callbacks always see one canonical host.
    if ($host = www.solari.gg) {
        return 301 https://solari.gg$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # The app is behind TLS even though this hop is plaintext loopback —
        # tell Auth.js/Next so cookies + AUTH_URL resolve as https.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        # WebSocket / HMR upgrade passthrough.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
