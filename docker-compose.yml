name: helios

# Default `docker compose up` brings up Postgres + Redis (Phase 0 acceptance
# target). Lavalink sits behind the `music` profile; the bot and dashboard sit
# behind the `apps` profile and are built/run with:
#   docker compose --profile apps up --build
# Run migrations against the running Postgres with `pnpm db:deploy`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helios}
      POSTGRES_DB: ${POSTGRES_DB:-helios}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-helios} -d ${POSTGRES_DB:-helios}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    profiles: ['music']
    environment:
      SERVER_PORT: 2333
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    ports:
      - '${LAVALINK_PORT:-2333}:2333'
    # NOTE: the official Lavalink image ships no nc/curl/wget, so a shell-based
    # healthcheck can't run. Nothing depends on Lavalink health in Phase 0; a
    # proper REST-based check is added alongside the music module in Phase 4.

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    profiles: ['apps']
    env_file: .env
    # In-container the DB/Redis/Lavalink hosts are the compose service names,
    # not the `localhost` values inherited from .env. Explicit `environment`
    # entries take precedence over `env_file`.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helios}:${POSTGRES_PASSWORD:-helios}@postgres:5432/${POSTGRES_DB:-helios}?schema=public
      REDIS_URL: redis://redis:6379
      LAVALINK_HOST: lavalink
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nightly logical backups of Postgres to the `postgres-backups` volume, with
  # rolling retention. Restore with `scripts/restore-db.sh` (see its header).
  # Copy backups off-host with: docker compose cp backup:/backups ./backups
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['apps']
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-helios}
      POSTGRES_USER: ${POSTGRES_USER:-helios}
      POSTGRES_DB: ${POSTGRES_DB:-helios}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "backup: nightly pg_dump, $${BACKUP_RETENTION_DAYS}-day retention"
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" | gzip > "/backups/helios-$$ts.sql.gz"; then
            echo "backup: wrote helios-$$ts.sql.gz ($$(du -h /backups/helios-$$ts.sql.gz | cut -f1))"
          else
            echo "backup: pg_dump FAILED" >&2
            rm -f "/backups/helios-$$ts.sql.gz"
          fi
          find /backups -name 'helios-*.sql.gz' -mtime +"$$BACKUP_RETENTION_DAYS" -delete
          sleep 86400
        done
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    profiles: ['apps']
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helios}:${POSTGRES_PASSWORD:-helios}@postgres:5432/${POSTGRES_DB:-helios}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
