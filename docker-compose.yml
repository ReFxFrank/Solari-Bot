name: helios

# Default `docker compose up` brings up Postgres + Redis (Phase 0 acceptance
# target). Lavalink sits behind the `music` profile; the bot and dashboard sit
# behind the `apps` profile and are built/run with:
#   docker compose --profile apps up --build
# Run migrations against the running Postgres with `pnpm db:deploy`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helios}
      POSTGRES_DB: ${POSTGRES_DB:-helios}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-helios} -d ${POSTGRES_DB:-helios}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    profiles: ['music']
    environment:
      SERVER_PORT: 2333
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      # YouTube auth for datacenter IPs (see the Music section in .env.example).
      YOUTUBE_OAUTH_ENABLED: ${YOUTUBE_OAUTH_ENABLED:-false}
      YOUTUBE_OAUTH_REFRESH_TOKEN: ${YOUTUBE_OAUTH_REFRESH_TOKEN:-}
      YOUTUBE_POT_TOKEN: ${YOUTUBE_POT_TOKEN:-}
      YOUTUBE_POT_VISITOR_DATA: ${YOUTUBE_POT_VISITOR_DATA:-}
      # Spotify via LavaSrc (see the Music section in .env.example).
      SPOTIFY_ENABLED: ${SPOTIFY_ENABLED:-false}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    ports:
      - '${LAVALINK_PORT:-2333}:2333'
    # NOTE: the official Lavalink image ships no nc/curl/wget, so a shell-based
    # healthcheck can't run. Nothing depends on Lavalink health in Phase 0; a
    # proper REST-based check is added alongside the music module in Phase 4.

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    profiles: ['apps']
    env_file: .env
    # In-container the DB/Redis/Lavalink hosts are the compose service names,
    # not the `localhost` values inherited from .env. Explicit `environment`
    # entries take precedence over `env_file`.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helios}:${POSTGRES_PASSWORD:-helios}@postgres:5432/${POSTGRES_DB:-helios}?schema=public
      REDIS_URL: redis://redis:6379
      LAVALINK_HOST: lavalink
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nightly logical backups of Postgres to the `postgres-backups` volume, with
  # rolling retention. Restore with `scripts/restore-db.sh` (see its header).
  # Set BACKUP_S3_* in .env to also push every dump to an S3-compatible store
  # (R2/B2/S3/MinIO); otherwise copy off-host manually with:
  #   docker compose cp backup:/backups ./backups
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['apps']
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-helios}
      POSTGRES_USER: ${POSTGRES_USER:-helios}
      POSTGRES_DB: ${POSTGRES_DB:-helios}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      # Offsite push (scripts/backup-loop.sh) — inactive while the bucket is
      # empty. rclone reads the RCLONE_S3_* names directly.
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-solari}
      BACKUP_S3_RETENTION_DAYS: ${BACKUP_S3_RETENTION_DAYS:-30}
      RCLONE_S3_PROVIDER: ${BACKUP_S3_PROVIDER:-Other}
      RCLONE_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      RCLONE_S3_REGION: ${BACKUP_S3_REGION:-}
      RCLONE_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      RCLONE_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
    entrypoint: ['/bin/sh', '/backup-loop.sh']
    volumes:
      - ./scripts/backup-loop.sh:/backup-loop.sh:ro
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    profiles: ['apps']
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helios}:${POSTGRES_PASSWORD:-helios}@postgres:5432/${POSTGRES_DB:-helios}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - '${WEB_PORT:-3000}:3000'
    healthcheck:
      # Node 20 has global fetch; a 2xx from the public landing page means the
      # app is actually serving (a hung-but-running process shows "unhealthy").
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
